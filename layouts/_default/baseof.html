<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale }}">

<head>
  {{ partial "head.html" . }}
</head>
<body{{ if .IsHome }} class="is-home"{{ end }}>

  <div class="hud">
    <div class="hud-col">

      <div class="hud-logo">
        <a href="/">{{ .Site.Title }}</a>
      </div>

      <nav>
        <ul>
          <li class="nav-home" style="--i:1;"><a href="#intro">Intro</a></li>
          <li class="nav-page" style="--i:2;"><a href="/">Back</a></li>
        </ul>
      </nav>

      <button class="hud-menu" aria-label="Toggle menu" aria-expanded="false">
        <span></span>
        <span></span>
      </button>

      <div class="hud-controls">
        <button class="hud-grid" aria-label="Toggle grid overlay">
          <span></span>
          <span style="--bd:1;"></span>
          <span style="--bd:2;"></span>
        </button>
        <div class="hud-theme" aria-label="Theme selector">
          <div class="hud-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="integer"></div>
          </div>
          <input type="range" min="0" max="6" step="1" value="3">
        </div>
      </div>

      <div class="hud-overlay">
        <div><span></span><span style="--bd:.5"></span></div>
        <div><span style="--bd:1"></span><span style="--bd:1.5"></span></div>
        <div><span style="--bd:2"></span><span style="--bd:2.5"></span></div>
        <div><span style="--bd:3"></span><span style="--bd:3.5"></span></div>
        <div><span style="--bd:4"></span><span style="--bd:4.5"></span></div>
      </div>

    </div>
  </div>

  <main id="swup" class="transition-main">
    {{ block "main" . }}{{ end }}
  </main>

  {{ $js := resources.Get "js/main.js" | js.Build (dict "minify" true) | fingerprint }}
  <script type="module" src="{{ $js.RelPermalink }}"></script>
</body>

</html>
